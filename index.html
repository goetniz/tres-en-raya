<!DOCTYPE html>
<html lang="es">
<head>

    <title>3 en Raya con Dificultad</title>
    <link rel="style" href="style.css">
</head>
<body>

<h1>3 en Raya</h1>

<div id="controls">
    <label for="difficulty">Dificultad: </label>

        <option value="easy">FÁCIL (falla 40%)</option>
        <option value="normal">NORMAL (falla 10%)</option>

    <button id="reset">Reiniciar</button>
</div>

<!-- ESTE DIV ES EL TABLERO — IMPORTANTE -->
<div id="board" class="board"></div>

<p id="status"></p>

<script src="script.js"></script>
