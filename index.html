<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3 en Raya</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 8px;
            transition: 0.2s;
        }

        button:hover {
            background: #357ab8;
        }

        #status {
            font-size: 22px;
            margin: 15px 0;
            font-weight: bold;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.15);
            transition: 0.2s;
        }

        .cell:hover {
            background: #e8e8e8;
        }
    </style>
</head>
<body>

    <h1>3 en Raya</h1>

    <div class="controls">
        <button id="difficultyBtn">Dificultad: Difícil</button>
        <button id="resetBtn">Nueva partida</button>
    </div>

    <div id="status">Tu turno</div>

    <div id="board"></div>

    <script>
        const boardEl = document.getElementById("board");
        const statusEl = document.getElementById("status");
        const diffBtn = document.getElementById("difficultyBtn");
        const resetBtn = document.getElementById("resetBtn");

        let board = ["","","","","","","","",""];
        let gameOver = false;
        let gamesPlayed = 0;

        let difficulty = "hard"; // hard | easy

        // BOTÓN PARA CAMBIAR DIFICULTAD
        diffBtn.onclick = () => {
            if (difficulty === "hard") {
                difficulty = "easy";
                diffBtn.textContent = "Dificultad: Fácil";
            } else {
                difficulty = "hard";
                diffBtn.textContent = "Dificultad: Difícil";
            }
        };

        // BOTÓN NUEVA PARTIDA
        resetBtn.onclick = () => {
            board = ["","","","","","","","",""];
            gameOver = false;
            statusEl.textContent = "Tu turno";
            render();
        };

        for (let i = 0; i < 9; i++) {
            let div = document.createElement("div");
            div.className = "cell";
            div.dataset.index = i;
            div.onclick = () => playerMove(i);
            boardEl.appendChild(div);
        }

        function render() {
            document.querySelectorAll(".cell").forEach((c, i) => {
                c.textContent = board[i];
            });
        }

        function playerMove(i) {
            if (board[i] !== "" || gameOver) return;

            board[i] = "X";
            render();

            if (checkWin("X")) {
                statusEl.textContent = "Ganaste 😎";
                gameOver = true;
                gamesPlayed++;
                return;
            }

            if (board.every(c => c !== "")) {
                statusEl.textContent = "Empate";
                gameOver = true;
                gamesPlayed++;
                return;
            }

            statusEl.textContent = "IA pensando...";
            setTimeout(aiMove, 400);
        }

        function aiMove() {
            let move;

            if (difficulty === "easy") {
                let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = empty[Math.floor(Math.random() * empty.length)];
            } else {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, 0, false);
                        board[i] = "";
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
            }

            board[move] = "O";
            render();

            if (checkWin("O")) {
                statusEl.textContent = "La IA te ganó 😈";
                gameOver = true;
                gamesPlayed++;
                return;
            }

            if (board.every(c => c !== "")) {
                statusEl.textContent = "Empate";
                gameOver = true;
                gamesPlayed++;
                return;
            }

            statusEl.textContent = "Tu turno";
        }

        function checkWin(p) {
            const w = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            return w.some(c => c.every(i => board[i] === p));
        }

        function minimax(boardState, depth, isMax) {
            if (checkWin("O")) return 10 - depth;
            if (checkWin("X")) return depth - 10;
            if (boardState.every(c => c !== "")) return 0;

            if (isMax) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (boardState[i] === "") {
                        boardState[i] = "O";
                        best = Math.max(best, minimax(boardState, depth + 1, false));
                        boardState[i] = "";
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (boardState[i] === "") {
                        boardState[i] = "X";
                        best = Math.min(best, minimax(boardState, depth + 1, true));
                        boardState[i] = "";
                    }
                }
                return best;
            }
        }
    </script>

</body>
</html>
