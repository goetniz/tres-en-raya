<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3 en Raya</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #00eaff;
            text-shadow: 0 0 15px #00eaff;
            letter-spacing: 2px;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background: rgba(0, 234, 255, 0.15);
            color: #00eaff;
            border: 2px solid #00eaff;
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 8px;
            transition: 0.3s;
            box-shadow: 0 0 10px #00eaff55;
        }

        button:hover {
            background: #00eaff;
            color: #000;
            box-shadow: 0 0 20px #00eaff;
        }

        #status {
            font-size: 24px;
            margin: 18px 0;
            font-weight: bold;
            color: #ffe45c;
            text-shadow: 0 0 12px #ffe45caa;
        }

        /* TABLERO NEÓN */
        #board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            padding: 20px;
        }

        .cell {
            width: 120px;
            height: 120px;
            background: #111;
            border: 2px solid #00eaff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            color: white;
            box-shadow: 0 0 15px #00eaff55;
        }

        .cell:hover {
            background: #00eaff33;
            transform: scale(1.05);
            box-shadow: 0 0 25px #00eaff;
        }

        /* ANIMACIÓN AL PONER X/O */
        .cell.filled {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<h1>3 EN RAYA</h1>

<div class="controls">
    <button id="difficultyBtn">Dificultad: Difícil</button>
    <button id="resetBtn">Nueva partida</button>
</div>

<div id="status">Tu turno</div>

<div id="board"></div>

<script>
/* TU JAVASCRIPT COMPLETO SIGUE EXACTAMENTE IGUAL... */
</script>

</body>
</html>
